name: Build
on:
  push:
    tags:
      - v*

env:
  REPRO_BUILD_DIR: /home/vagrant/build/de.circle_dev.flux_news

jobs:
  build:
    name: Build & Release 
    runs-on: ubuntu-latest

    steps:
        #1 Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Prepare F-Droid Compatible Build Directory
        run: |
          sudo mkdir -p "$(dirname "${REPRO_BUILD_DIR}")"
          sudo chown -R "${USER}:${USER}" /home/vagrant
          mkdir -p "${REPRO_BUILD_DIR}"
          cp -a "${GITHUB_WORKSPACE}/." "${REPRO_BUILD_DIR}/"
          rm -rf "${REPRO_BUILD_DIR}/ios"

      - name: Restore Flutter Version Metadata
        working-directory: ${{ env.REPRO_BUILD_DIR }}
        run: |
          flutter_commit="$(git -C vendor/flutter rev-parse HEAD)"
          flutter_version="$(
            git -C vendor/flutter ls-remote --tags origin |
              awk -v commit="${flutter_commit}" '
                $1 == commit {
                  tag = $2
                  sub(/^refs\/tags\//, "", tag)
                  sub(/\^\{\}$/, "", tag)
                  if (tag ~ /^[0-9]+\.[0-9]+\.[0-9]+$/) {
                    print tag
                  }
                }
              ' |
              sort -V |
              tail -n 1
          )"
          if [[ -z "${flutter_version}" ]]; then
            echo "::error::Flutter submodule commit ${flutter_commit} has no release tag"
            exit 1
          fi
          git -C vendor/flutter fetch --force --depth=1 origin \
            "refs/tags/${flutter_version}:refs/tags/${flutter_version}"
          test "$(git -C vendor/flutter rev-parse HEAD)" = \
            "$(git -C vendor/flutter rev-list -n 1 "${flutter_version}")"
          echo "FLUTTER_VERSION=${flutter_version}" >> "${GITHUB_ENV}"
          vendor/flutter/bin/flutter --version
        
        #2 Setup Java
      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      
        #3 Install Dependencies with the same Flutter checkout used by F-Droid
      - name: Install Dependencies
        working-directory: ${{ env.REPRO_BUILD_DIR }}
        env:
          PUB_CACHE: ${{ env.REPRO_BUILD_DIR }}/.pub-cache
        run: |
          vendor/flutter/bin/flutter config --no-analytics
          vendor/flutter/bin/flutter pub get
          sed -i -e '/play-services-cronet/d' "$PUB_CACHE"/hosted/pub.dev/cronet_http-*/android/build.gradle
          
        #4 Setup Keystore
      - name: Decode Keystore
        working-directory: ${{ env.REPRO_BUILD_DIR }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          
      - name: Create key.properties
        working-directory: ${{ env.REPRO_BUILD_DIR }}
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
        
        #5 Build each ABI exactly like F-Droid, then build the universal APK
      - name: Build APK
        working-directory: ${{ env.REPRO_BUILD_DIR }}
        env:
          PUB_CACHE: ${{ env.REPRO_BUILD_DIR }}/.pub-cache
        run: |
          vendor/flutter/bin/flutter build apk --release --split-per-abi --target-platform=android-x64 --dart-define=cronetHttpNoPlay=true
          vendor/flutter/bin/flutter build apk --release --split-per-abi --target-platform=android-arm --dart-define=cronetHttpNoPlay=true
          vendor/flutter/bin/flutter build apk --release --split-per-abi --target-platform=android-arm64 --dart-define=cronetHttpNoPlay=true
          vendor/flutter/bin/flutter build apk --release --dart-define=cronetHttpNoPlay=true

      - name: Copy Release Artifacts
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/build/app/outputs/flutter-apk"
          cp "${REPRO_BUILD_DIR}"/build/app/outputs/flutter-apk/* \
            "${GITHUB_WORKSPACE}/build/app/outputs/flutter-apk/"

        #6 Extract Version
      - name: Extract version and release from pubspec.yaml
        id: extract_version
        working-directory: ${{ env.REPRO_BUILD_DIR }}
        run: |
          version=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r' | cut -d+ -f 1)
          echo "VERSION=$version" >> $GITHUB_ENV
          versioncode=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r' | cut -d+ -f 2)
          echo "VERSIONCODE=$versioncode" >> $GITHUB_ENV
          changelog_versioncode=$((versioncode + 1))
          echo "CHANGELOG_VERSIONCODE=$changelog_versioncode" >> $GITHUB_ENV

        #7 Extract the developer signatures for F-Droid dual publication
      - name: Extract F-Droid Signatures
        env:
          APK_DIR: ${{ github.workspace }}/build/app/outputs/flutter-apk
          SIGNATURE_ROOT: ${{ github.workspace }}/build/fdroid-signatures
        run: |
          python3 -m pip install --user --disable-pip-version-check \
            apksigcopier==1.1.1
          export PATH="${HOME}/.local/bin:${PATH}"

          declare -A apk_version_codes=(
            [app-x86_64-release.apk]=$((VERSIONCODE + 1))
            [app-armeabi-v7a-release.apk]=$((VERSIONCODE + 2))
            [app-arm64-v8a-release.apk]=$((VERSIONCODE + 3))
          )

          for apk in "${!apk_version_codes[@]}"; do
            version_code="${apk_version_codes[$apk]}"
            output_dir="${SIGNATURE_ROOT}/metadata/de.circle_dev.flux_news/signatures/${version_code}"
            mkdir -p "${output_dir}"
            apksigcopier extract --v1-only=auto \
              "${APK_DIR}/${apk}" "${output_dir}"
          done

          archive="${APK_DIR}/fdroid-signatures-v${VERSION}.tar.gz"
          tar -czf "${archive}" -C "${SIGNATURE_ROOT}" metadata
          tar -tzf "${archive}"

        #8 Upload APKs and the extracted F-Droid signatures
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          path: build/app/outputs/flutter-apk/*
        
        #9 Create Release
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*"
          tag: v${{ env.VERSION }}
          name: ${{ env.VERSION }}
          bodyFile: metadata/en-US/changelogs/${{ env.CHANGELOG_VERSIONCODE }}.txt
          token: ${{ secrets.TOKEN }}

      - name: Enable F-Droid Signature Submission
        env:
          GH_TOKEN: ${{ secrets.FDROID_WORKFLOW_CONTROL_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::error::Repository secret FDROID_WORKFLOW_CONTROL_TOKEN is not configured"
            exit 1
          fi

          gh variable set ENABLE_FDROID_SIGNATURE_SUBMISSION \
            --repo "${GITHUB_REPOSITORY}" \
            --body "true"
