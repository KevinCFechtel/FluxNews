name: Build
on:
  push:
    tags:
      - v*

jobs:
  build:
    name: Build & Release 
    runs-on: ubuntu-latest

    steps:
        #1 Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: recursive
        
        #2 Setup Java
      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
        #3 Install Dependencies with the same Flutter checkout used by F-Droid
      - name: Install Dependencies
        env:
          PUB_CACHE: ${{ github.workspace }}/.pub-cache
        run: |
          vendor/flutter/bin/flutter config --no-analytics
          vendor/flutter/bin/flutter pub get
          sed -i -e '/play-services-cronet/d' "$PUB_CACHE"/hosted/pub.dev/cronet_http-*/android/build.gradle
          
        #4 Setup Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
        
        #5 Build each ABI exactly like F-Droid, then build the universal APK
      - name: Build APK
        env:
          PUB_CACHE: ${{ github.workspace }}/.pub-cache
        run: |
          vendor/flutter/bin/flutter build apk --release --split-per-abi --target-platform=android-x64 --dart-define=cronetHttpNoPlay=true
          vendor/flutter/bin/flutter build apk --release --split-per-abi --target-platform=android-arm --dart-define=cronetHttpNoPlay=true
          vendor/flutter/bin/flutter build apk --release --split-per-abi --target-platform=android-arm64 --dart-define=cronetHttpNoPlay=true
          vendor/flutter/bin/flutter build apk --release --dart-define=cronetHttpNoPlay=true

        #6 Upload Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: build/app/outputs/flutter-apk/*

        #7 Extract Version
      - name: Extract version and release from pubspec.yaml
        id: extract_version
        run: |
          version=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r' | cut -d+ -f 1)
          echo "VERSION=$version" >> $GITHUB_ENV
          versioncode=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r' | cut -d+ -f 2)
          echo "VERSIONCODE=$versioncode" >> $GITHUB_ENV
          changelog_versioncode=$((versioncode + 1))
          echo "CHANGELOG_VERSIONCODE=$changelog_versioncode" >> $GITHUB_ENV
        
        #8 Create Release
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*"
          tag: v${{ env.VERSION }}
          name: ${{ env.VERSION }}
          bodyFile: metadata/en-US/changelogs/${{ env.CHANGELOG_VERSIONCODE }}.txt
          token: ${{ secrets.TOKEN }}
