name: Submit F-Droid Signatures

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to submit, for example v2.2.5"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: submit-fdroid-signatures
  cancel-in-progress: false

jobs:
  submit-signatures:
    # Enable with repository variable ENABLE_FDROID_SIGNATURE_SUBMISSION=true.
    # Also configure FDROID_GITLAB_FORK and the FDROID_GITLAB_TOKEN secret.
    if: ${{ vars.ENABLE_FDROID_SIGNATURE_SUBMISSION == 'true' }}
    name: Wait for metadata and submit signatures
    runs-on: ubuntu-latest
    env:
      APP_ID: de.circle_dev.flux_news
      FDROID_GITLAB_FORK: ${{ vars.FDROID_GITLAB_FORK }}
      FDROID_GITLAB_TOKEN: ${{ secrets.FDROID_GITLAB_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      INPUT_RELEASE_TAG: ${{ inputs.release_tag }}

    steps:
      - name: Check configuration
        run: |
          if [[ -z "${FDROID_GITLAB_FORK}" ]]; then
            echo "::error::Repository variable FDROID_GITLAB_FORK is not configured"
            exit 1
          fi
          if [[ -z "${FDROID_GITLAB_TOKEN}" ]]; then
            echo "::error::Repository secret FDROID_GITLAB_TOKEN is not configured"
            exit 1
          fi

      - name: Select release
        id: release
        run: |
          if [[ -n "${INPUT_RELEASE_TAG}" ]]; then
            tag="${INPUT_RELEASE_TAG}"
          else
            tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Unsupported release tag: ${tag}"
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Download GitHub release assets
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p "${RUNNER_TEMP}/github-apks" "${RUNNER_TEMP}/signatures"
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir "${RUNNER_TEMP}/github-apks" \
            --pattern "fdroid-signatures-v${RELEASE_VERSION}.tar.gz"

          tar -xzf \
            "${RUNNER_TEMP}/github-apks/fdroid-signatures-v${RELEASE_VERSION}.tar.gz" \
            -C "${RUNNER_TEMP}/signatures"

      - name: Determine F-Droid version codes
        id: version_codes
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          pubspec="$(
            gh api \
              -H "Accept: application/vnd.github.raw+json" \
              "repos/${GITHUB_REPOSITORY}/contents/pubspec.yaml?ref=${RELEASE_TAG}"
          )"
          base_version_code="$(
            printf '%s\n' "${pubspec}" |
              sed -n 's/^version: .*+\([0-9][0-9]*\)$/\1/p'
          )"

          if [[ -z "${base_version_code}" ]]; then
            echo "::error::Could not read the base version code from ${RELEASE_TAG}"
            exit 1
          fi

          echo "x86_64=$((base_version_code + 1))" >> "${GITHUB_OUTPUT}"
          echo "armeabi_v7a=$((base_version_code + 2))" >> "${GITHUB_OUTPUT}"
          echo "arm64_v8a=$((base_version_code + 3))" >> "${GITHUB_OUTPUT}"

          for version_code in \
            "$((base_version_code + 1))" \
            "$((base_version_code + 2))" \
            "$((base_version_code + 3))"; do
            signature_dir="${RUNNER_TEMP}/signatures/metadata/${APP_ID}/signatures/${version_code}"
            if [[ ! -d "${signature_dir}" ]] ||
               [[ -z "$(find "${signature_dir}" -maxdepth 1 -type f -size +0c -print -quit)" ]]; then
              echo "::error::Signature archive has no files for version code ${version_code}"
              exit 1
            fi
          done

      - name: Check F-Droid build metadata
        id: fdroid_metadata
        env:
          X86_64_VERSION_CODE: ${{ steps.version_codes.outputs.x86_64 }}
          ARMEABI_V7A_VERSION_CODE: ${{ steps.version_codes.outputs.armeabi_v7a }}
          ARM64_V8A_VERSION_CODE: ${{ steps.version_codes.outputs.arm64_v8a }}
        run: |
          checkout="${RUNNER_TEMP}/fdroiddata"
          metadata="${checkout}/metadata/${APP_ID}.yml"

          git clone --depth=1 \
            https://gitlab.com/fdroid/fdroiddata.git "${checkout}"

          missing=false
          for version_code in \
            "${X86_64_VERSION_CODE}" \
            "${ARMEABI_V7A_VERSION_CODE}" \
            "${ARM64_V8A_VERSION_CODE}"; do
            if grep -Eq \
              "^[[:space:]]+versionCode:[[:space:]]+${version_code}[[:space:]]*$" \
              "${metadata}"; then
              echo "Found F-Droid build entry for version code ${version_code}"
            else
              echo "F-Droid build entry is not available yet: ${version_code}"
              missing=true
            fi
          done

          if [[ "${missing}" == "true" ]]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "The scheduled workflow will check fdroiddata again later"
            exit 0
          fi

          echo "ready=true" >> "${GITHUB_OUTPUT}"

      - name: Submit signatures to fdroiddata
        if: ${{ steps.fdroid_metadata.outputs.ready == 'true' }}
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          checkout="${RUNNER_TEMP}/fdroiddata"
          branch="fluxnews-signatures-${RELEASE_TAG}"
          signature_source="${RUNNER_TEMP}/signatures/metadata/${APP_ID}/signatures"

          mkdir -p "${checkout}/metadata/${APP_ID}/signatures"
          cp -a "${signature_source}/." \
            "${checkout}/metadata/${APP_ID}/signatures/"

          cd "${checkout}"
          git switch -c "${branch}"
          git config user.name "Flux News release bot"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git add "metadata/${APP_ID}/signatures"

          if git diff --cached --quiet; then
            echo "Developer signatures for ${RELEASE_TAG} are already present"
            exit 0
          fi

          git commit -m "Add Flux News ${RELEASE_VERSION} developer signatures"
          git remote add fork \
            "https://oauth2:${FDROID_GITLAB_TOKEN}@gitlab.com/${FDROID_GITLAB_FORK}.git"

          if git ls-remote --exit-code --heads fork "${branch}" >/dev/null 2>&1; then
            echo "Branch ${branch} already exists in ${FDROID_GITLAB_FORK}"
            exit 0
          fi

          description="Adds the developer signatures for Flux News ${RELEASE_VERSION}.\n\nThe matching x86_64, armeabi-v7a, and arm64-v8a build entries are present in fdroiddata. The merge request pipeline can rebuild the APKs and verify the signatures before dual publication."
          git push fork "HEAD:refs/heads/${branch}" \
            -o merge_request.create \
            -o merge_request.target=master \
            -o merge_request.target_project=fdroid/fdroiddata \
            -o merge_request.remove_source_branch \
            -o merge_request.title="Add Flux News ${RELEASE_VERSION} developer signatures" \
            -o merge_request.description="${description}"
